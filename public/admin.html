<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="/style.css"></head><body><main class="wrap section"><h2>Newsroom Admin</h2><section id="login" class="card"><h3>Login</h3><form id="loginForm" class="form"><input name="email" type="email" placeholder="Email" required><input name="password" type="password" placeholder="Password" required><button class="btn primary">Login</button></form></section><section id="dash" class="hidden"><div class="adminbar"><p id="who"></p><button id="logout" class="btn">Logout</button></div><div class="grid"><form id="postForm" class="card form"><h3>Create story</h3><input name="title" placeholder="Headline" required><input name="dek" placeholder="Short summary / subheading"><select name="brand" id="brand"></select><select name="category"><option>News</option><option>Politics</option><option>World</option><option>Local</option><option>Opinion</option><option>Business</option></select><select name="status"><option value="draft">Draft</option><option value="published">Publish now</option></select><textarea name="body" placeholder="Article body"></textarea><button class="btn primary">Save story</button></form><div><h3>Recent newsroom items</h3><div id="adminPosts" class="form"></div></div></div></section></main><div id="foot"></div><script src="/app.js"></script><script>renderAdmin()</script></body></html>
